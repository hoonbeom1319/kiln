<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>점심투표 · 투표 참여</title>
<style>
:root{
  --white:#fff;--black:#000;
  --gray-50:#f7f6f4;--gray-100:#eeece8;--gray-200:#e0ddd6;--gray-300:#cbc7bd;--gray-400:#a8a297;--gray-500:#837d71;--gray-600:#635e54;--gray-700:#47433b;--gray-800:#2c2a25;--gray-900:#1a1815;
  --orange-50:#fff4ec;--orange-100:#ffe3d1;--orange-200:#ffc4a0;--orange-300:#ff9f66;--orange-400:#fb7f36;--orange-500:#e8590c;--orange-600:#c2410c;--orange-700:#9a3412;
  --green-100:#d7f2df;--green-500:#2f9e44;--green-600:#218839;--green-700:#1a6e2e;
  --red-100:#ffe0e0;--red-500:#e03131;--red-600:#c92a2a;
  --amber-100:#fff2cc;--amber-500:#f08c00;--amber-700:#b45309;
  --blue-500:#1c7ed6;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;
  --radius-1:8px;--radius-2:12px;--radius-3:20px;--radius-full:999px;
  --font-1:13px;--font-2:15px;--font-3:18px;--font-4:22px;--font-5:28px;
  --touch-min:48px;
  --color-bg:var(--gray-50);--color-surface:var(--white);--color-surface-alt:var(--gray-100);
  --color-border:var(--gray-200);--color-border-strong:var(--gray-300);
  --color-text:var(--gray-900);--color-text-muted:var(--gray-600);--color-text-subtle:var(--gray-500);
  --color-primary:var(--orange-500);--color-primary-hover:var(--orange-600);--color-primary-soft:var(--orange-100);--color-on-primary:var(--white);
  --color-vote-bar:var(--orange-400);--color-vote-bar-track:var(--gray-200);
  --color-success:var(--green-600);--color-success-soft:var(--green-100);
  --color-danger:var(--red-600);--color-danger-soft:var(--red-100);
  --color-warning:var(--amber-700);--color-warning-soft:var(--amber-100);
  --color-focus-ring:var(--orange-400);--color-overlay:rgba(26,24,21,.55);
  --shadow-1:0 1px 2px rgba(26,24,21,.06),0 1px 3px rgba(26,24,21,.08);
  --shadow-2:0 4px 12px rgba(26,24,21,.10),0 2px 4px rgba(26,24,21,.06);
  --shadow-3:0 12px 32px rgba(26,24,21,.16),0 4px 8px rgba(26,24,21,.08);
}
:root[data-theme="dark"]{
  --color-bg:var(--gray-900);--color-surface:var(--gray-800);--color-surface-alt:#232019;
  --color-border:#3a362f;--color-border-strong:#4a453c;
  --color-text:var(--gray-50);--color-text-muted:var(--gray-300);--color-text-subtle:var(--gray-400);
  --color-primary:var(--orange-400);--color-primary-hover:var(--orange-300);--color-primary-soft:#3a2415;--color-on-primary:#1a1815;
  --color-vote-bar:var(--orange-400);--color-vote-bar-track:#3a362f;
  --color-success-soft:#183a22;--color-danger-soft:#3a1a1a;--color-warning-soft:#3a2f15;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 4px 12px rgba(0,0,0,.5);--shadow-3:0 16px 40px rgba(0,0,0,.6);
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --color-bg:var(--gray-900);--color-surface:var(--gray-800);--color-surface-alt:#232019;
  --color-border:#3a362f;--color-border-strong:#4a453c;
  --color-text:var(--gray-50);--color-text-muted:var(--gray-300);--color-text-subtle:var(--gray-400);
  --color-primary:var(--orange-400);--color-primary-hover:var(--orange-300);--color-primary-soft:#3a2415;--color-on-primary:#1a1815;
  --color-vote-bar:var(--orange-400);--color-vote-bar-track:#3a362f;
  --color-success-soft:#183a22;--color-danger-soft:#3a1a1a;--color-warning-soft:#3a2f15;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 4px 12px rgba(0,0,0,.5);--shadow-3:0 16px 40px rgba(0,0,0,.6);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--color-bg);color:var(--color-text);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100dvh}
.app{width:100%;max-width:560px;margin:0 auto;padding-bottom:calc(var(--sp-6) + env(safe-area-inset-bottom))}
.appbar{
  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--color-bg) 82%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--color-border);
  padding:calc(var(--sp-3) + env(safe-area-inset-top)) var(--sp-3) var(--sp-3);display:flex;align-items:center;gap:var(--sp-2)}
.appbar .title{flex:1;text-align:center;font-weight:800;font-size:var(--font-3)}
.iconbtn{width:var(--touch-min);height:var(--touch-min);border-radius:var(--radius-full);border:1px solid transparent;background:transparent;color:var(--color-text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;text-decoration:none}
.iconbtn:hover{background:var(--color-surface-alt)}
.iconbtn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.content{padding:var(--sp-5) var(--sp-4) 0}
/* poll hero */
.hero{margin-bottom:var(--sp-5)}
.hero h1{font-size:var(--font-4);font-weight:800;letter-spacing:-.01em}
.hero .by{font-size:var(--font-1);color:var(--color-text-muted);margin-top:var(--sp-1)}
/* status banner */
.status{
  display:flex;align-items:center;gap:var(--sp-3);border-radius:var(--radius-2);
  padding:var(--sp-3) var(--sp-4);margin-top:var(--sp-4);font-size:var(--font-2);font-weight:600;
}
.status.live{background:var(--color-primary-soft);color:var(--color-primary)}
.status.live .dot{width:8px;height:8px;border-radius:50%;background:var(--color-primary);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}
.status .time{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:800;font-size:var(--font-3)}
.status.closed{background:var(--color-surface-alt);color:var(--color-text-muted)}
.status.tie{background:var(--color-warning-soft);color:var(--color-warning)}
/* candidate option */
.opts{display:flex;flex-direction:column;gap:var(--sp-3);margin-top:var(--sp-5)}
.opt{
  position:relative;display:block;width:100%;text-align:left;cursor:pointer;
  background:var(--color-surface);border:1.5px solid var(--color-border);
  border-radius:var(--radius-3);padding:var(--sp-4);overflow:hidden;
  transition:border-color .15s,box-shadow .15s,transform .1s;
}
.opt:hover{border-color:var(--color-border-strong);box-shadow:var(--shadow-1)}
.opt:active{transform:scale(.995)}
.opt:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.opt.selected{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-soft)}
.opt .fill{position:absolute;inset:0 auto 0 0;background:var(--color-vote-bar);opacity:.14;width:0;transition:width .6s cubic-bezier(.22,1,.36,1)}
.opt.selected .fill{opacity:.20}
.opt .row{position:relative;display:flex;align-items:center;gap:var(--sp-3)}
.opt .radio{
  width:24px;height:24px;flex:none;border-radius:var(--radius-full);
  border:2px solid var(--color-border-strong);display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.selected .radio{border-color:var(--color-primary);background:var(--color-primary)}
.opt .radio::after{content:"";width:9px;height:9px;border-radius:50%;background:#fff;transform:scale(0);transition:transform .15s}
.opt.selected .radio::after{transform:scale(1)}
.opt .emoji{font-size:26px;flex:none}
.opt .name{flex:1;font-size:var(--font-3);font-weight:700}
.opt .name .mine{display:none;font-size:11px;font-weight:800;color:var(--color-primary);background:var(--color-primary-soft);padding:2px 7px;border-radius:var(--radius-full);margin-left:var(--sp-2);vertical-align:middle}
.opt.selected .name .mine{display:inline-block}
.opt .stat{flex:none;text-align:right}
.opt .pct{font-size:var(--font-3);font-weight:800;font-variant-numeric:tabular-nums}
.opt .cnt{font-size:var(--font-1);color:var(--color-text-muted);font-variant-numeric:tabular-nums}
/* rank badge (result mode) */
.opt .rank{display:none;position:absolute;top:var(--sp-3);right:var(--sp-4);font-size:var(--font-1);font-weight:800;color:var(--color-text-subtle)}
body.closed .opt .rank{display:block}
body.closed .opt .radio{display:none}
body.closed .opt{cursor:default}
body.closed .opt:hover{transform:none}
.opt.winner{border-color:var(--color-success);box-shadow:0 0 0 3px var(--color-success-soft)}
.opt.winner .fill{background:var(--color-success);opacity:.16}
.opt.winner .crown{display:none;font-size:20px}
body.closed .opt.winner .crown{display:inline}
/* tie highlight */
body.tie .opt.tied{border-color:var(--color-warning);box-shadow:0 0 0 3px var(--color-warning-soft)}
body.tie .opt.tied .fill{background:var(--color-warning);opacity:.16}
/* meta row */
.meta{display:flex;align-items:center;justify-content:space-between;margin-top:var(--sp-5);font-size:var(--font-1);color:var(--color-text-muted)}
.meta .part{display:flex;align-items:center;gap:var(--sp-2)}
.dots{display:flex}
.dots i{width:22px;height:22px;border-radius:50%;margin-left:-6px;border:2px solid var(--color-surface);background:var(--orange-300);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.dots i:first-child{margin-left:0}
/* result banner */
.result-banner{
  display:none;margin-top:var(--sp-5);border-radius:var(--radius-3);padding:var(--sp-5);
  text-align:center;box-shadow:var(--shadow-1)}
body.closed:not(.tie) .result-banner.win{display:block;background:linear-gradient(135deg,var(--color-success-soft),color-mix(in srgb,var(--color-success-soft) 50%,var(--color-surface)));border:1px solid color-mix(in srgb,var(--color-success) 30%,transparent)}
body.tie .result-banner.tie{display:block;background:var(--color-warning-soft);border:1px solid color-mix(in srgb,var(--color-warning) 35%,transparent)}
.result-banner .big{font-size:var(--font-4);font-weight:800;margin:var(--sp-2) 0}
.result-banner .lbl{font-size:var(--font-1);font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.result-banner.win .lbl{color:var(--color-success)}
.result-banner.tie .lbl{color:var(--color-warning)}
.result-banner .sub{font-size:var(--font-2);color:var(--color-text-muted)}
.tie-actions{display:flex;gap:var(--sp-3);margin-top:var(--sp-4)}
/* sticky vote CTA */
.votebar{
  position:sticky;bottom:0;margin-top:var(--sp-6);
  padding:var(--sp-3) 0 calc(var(--sp-3) + env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--color-bg) 70%,transparent);
}
.btn{width:100%;height:var(--touch-min);border-radius:var(--radius-2);font-size:var(--font-2);font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:var(--sp-2);border:1px solid transparent;transition:background .15s,transform .08s,box-shadow .15s;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.btn-primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-2)}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-primary[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:var(--color-surface);border-color:var(--color-border-strong);color:var(--color-text)}
.btn-ghost:hover{background:var(--color-surface-alt)}
.btn-danger{background:var(--color-danger);color:#fff;flex:1}
.voted-note{display:none;text-align:center;font-size:var(--font-1);color:var(--color-success);font-weight:700;margin-top:var(--sp-2)}
body.has-voted .voted-note{display:block}
/* demo toggle */
.demo{margin:var(--sp-5) 0 0;text-align:center}
.demo button{font-size:var(--font-1);color:var(--color-text-subtle);background:transparent;border:1px dashed var(--color-border-strong);border-radius:var(--radius-full);padding:6px 14px;cursor:pointer}
.demo button:hover{color:var(--color-primary);border-color:var(--color-primary)}
.oos{font-size:11px;color:var(--color-text-subtle);border:1px solid var(--color-border);border-radius:var(--radius-full);padding:2px 8px;margin-left:6px}
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <a class="iconbtn" href="home.html" aria-label="뒤로">←</a>
    <div class="title">투표</div>
    <button class="iconbtn" id="themeBtn" aria-label="다크모드 전환">🌙</button>
  </header>

  <main class="content">
    <div class="hero">
      <h1>우리 팀 오늘 점심 🍽️</h1>
      <div class="by">호스트 · 지원 (나) · 후보 4개</div>
    </div>

    <!-- 진행중 상태 -->
    <div class="status live" id="statusLive">
      <span class="dot" aria-hidden="true"></span>
      <span>실시간 집계 중</span>
      <span class="time" id="countdown" aria-live="polite">31:52</span>
    </div>
    <!-- 마감 상태 -->
    <div class="status closed" id="statusClosed" style="display:none">
      <span aria-hidden="true">🔒</span><span>투표 마감됨 · 12:40 확정</span>
    </div>

    <!-- options -->
    <div class="opts" id="opts" role="radiogroup" aria-label="후보 선택">
      <button type="button" class="opt" data-votes="10" role="radio" aria-checked="false">
        <span class="fill"></span>
        <span class="rank">1위</span>
        <span class="row">
          <span class="radio" aria-hidden="true"></span>
          <span class="emoji" aria-hidden="true">🍲</span>
          <span class="name">김치찌개집 <span class="crown" aria-hidden="true">👑</span><span class="mine">내 표</span></span>
          <span class="stat"><span class="pct">40%</span><span class="cnt">10표</span></span>
        </span>
      </button>

      <button type="button" class="opt" data-votes="7" role="radio" aria-checked="false">
        <span class="fill"></span>
        <span class="rank">2위</span>
        <span class="row">
          <span class="radio" aria-hidden="true"></span>
          <span class="emoji" aria-hidden="true">🍝</span>
          <span class="name">파스타집 <span class="crown" aria-hidden="true">👑</span><span class="mine">내 표</span></span>
          <span class="stat"><span class="pct">28%</span><span class="cnt">7표</span></span>
        </span>
      </button>

      <button type="button" class="opt" data-votes="5" role="radio" aria-checked="false">
        <span class="fill"></span>
        <span class="rank">3위</span>
        <span class="row">
          <span class="radio" aria-hidden="true"></span>
          <span class="emoji" aria-hidden="true">🥗</span>
          <span class="name">샐러드볼 <span class="crown" aria-hidden="true">👑</span><span class="mine">내 표</span></span>
          <span class="stat"><span class="pct">20%</span><span class="cnt">5표</span></span>
        </span>
      </button>

      <button type="button" class="opt" data-votes="3" role="radio" aria-checked="false">
        <span class="fill"></span>
        <span class="rank">4위</span>
        <span class="row">
          <span class="radio" aria-hidden="true"></span>
          <span class="emoji" aria-hidden="true">🍛</span>
          <span class="name">돈까스 <span class="crown" aria-hidden="true">👑</span><span class="mine">내 표</span></span>
          <span class="stat"><span class="pct">12%</span><span class="cnt">3표</span></span>
        </span>
      </button>
    </div>

    <div class="meta">
      <div class="part">
        <div class="dots" aria-hidden="true"><i>지</i><i style="background:var(--orange-400)">민</i><i style="background:var(--orange-500)">준</i><i style="background:var(--gray-400)">+22</i></div>
        <span><b id="totalVotes">25</b>명 투표 · 팀원 30명</span>
      </div>
      <span>🔄 3초마다 갱신</span>
    </div>

    <!-- 결과 배너 (마감/일반) -->
    <div class="result-banner win">
      <div class="lbl">✓ 최종 결과</div>
      <div class="big">🍲 김치찌개집</div>
      <div class="sub">10표 획득 · 참여 25명 중 · 오늘의 점심 확정!</div>
    </div>
    <!-- 결과 배너 (동점) -->
    <div class="result-banner tie">
      <div class="lbl">⚖ 동점입니다</div>
      <div class="big">김치찌개집 · 파스타집</div>
      <div class="sub">두 후보가 각 10표로 동점이에요. 어떻게 결정할까요?</div>
      <div class="tie-actions">
        <button class="btn btn-ghost" id="revoteBtn" style="flex:1">🔁 재투표</button>
        <button class="btn btn-primary" id="rouletteBtn" style="flex:1;box-shadow:none">🎲 무작위 추첨</button>
      </div>
    </div>

    <!-- 투표 CTA -->
    <div class="votebar" id="votebar">
      <button class="btn btn-primary" id="voteBtn" disabled>후보를 선택하세요</button>
      <div class="voted-note">✓ 투표 완료 — 마감 전까지 변경할 수 있어요</div>
    </div>

    <!-- 데모 상태 전환 -->
    <div class="demo">
      <button id="toggleClose" type="button">▶ 데모: 마감 시뮬레이션 (진행중 ⇄ 결과)</button>
    </div>
  </main>
</div>

<script>
(function(){
  var root=document.documentElement, tbtn=document.getElementById('themeBtn');
  function sysDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches}
  function cur(){var t=root.getAttribute('data-theme');return t?t:(sysDark()?'dark':'light')}
  function paint(){tbtn.textContent=cur()==='dark'?'☀️':'🌙'}
  paint();
  tbtn.addEventListener('click',function(){root.setAttribute('data-theme',cur()==='dark'?'light':'dark');paint()});

  var opts=Array.prototype.slice.call(document.querySelectorAll('.opt'));
  var voteBtn=document.getElementById('voteBtn');
  var totalVotesEl=document.getElementById('totalVotes');
  var selected=null, hasVoted=false;

  function recompute(){
    var votes=opts.map(function(o){return parseInt(o.dataset.votes,10)});
    var total=votes.reduce(function(a,b){return a+b},0);
    var max=Math.max.apply(null,votes);
    var maxCount=votes.filter(function(v){return v===max}).length;
    // 순위 정렬용 인덱스
    var order=opts.map(function(o,i){return i}).sort(function(a,b){return votes[b]-votes[a]});
    var rankOf={};order.forEach(function(idx,r){rankOf[idx]=r+1});
    opts.forEach(function(o,i){
      var pct=total?Math.round(votes[i]/total*100):0;
      o.querySelector('.fill').style.width=(total?votes[i]/max*100:0)+'%';
      o.querySelector('.pct').textContent=pct+'%';
      o.querySelector('.cnt').textContent=votes[i]+'표';
      o.querySelector('.rank').textContent=rankOf[i]+'위';
      o.classList.toggle('winner',votes[i]===max);
      o.classList.toggle('tied',votes[i]===max&&maxCount>1);
    });
    totalVotesEl.textContent=total;
    return {max:max,maxCount:maxCount};
  }

  // 선택
  opts.forEach(function(o){
    o.addEventListener('click',function(){
      if(document.body.classList.contains('closed'))return;
      opts.forEach(function(x){x.classList.remove('selected');x.setAttribute('aria-checked','false')});
      o.classList.add('selected');o.setAttribute('aria-checked','true');selected=o;
      voteBtn.disabled=false;
      voteBtn.textContent=hasVoted?'선택 변경하기':'이 후보에 투표하기';
    });
  });

  // 투표 (내 표 반영 — 선택 후보 +1)
  voteBtn.addEventListener('click',function(){
    if(!selected||document.body.classList.contains('closed'))return;
    if(hasVoted){
      // 이전 표 회수
      if(voteBtn.dataset.prev){var prev=opts[parseInt(voteBtn.dataset.prev,10)];prev.dataset.votes=parseInt(prev.dataset.votes,10)-1;}
    }
    selected.dataset.votes=parseInt(selected.dataset.votes,10)+1;
    voteBtn.dataset.prev=opts.indexOf(selected);
    hasVoted=true;document.body.classList.add('has-voted');
    voteBtn.textContent='✓ 투표 완료 · 변경하려면 다시 선택';
    voteBtn.classList.remove('btn-primary');voteBtn.classList.add('btn-ghost');
    recompute();
  });

  // 카운트다운 (진행중)
  var secs=31*60+52, cd=document.getElementById('countdown'), timer=null;
  function tick(){
    secs--;if(secs<0){secs=0;closePoll();return;}
    var m=Math.floor(secs/60),s=secs%60;
    cd.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  }
  function startTimer(){if(!timer)timer=setInterval(tick,1000)}
  function stopTimer(){clearInterval(timer);timer=null}

  // 준실시간 갱신 시뮬 (다른 사람 표)
  var poll=setInterval(function(){
    if(document.body.classList.contains('closed'))return;
    var i=(secs)%opts.length; // 결정적 변화(Math.random 미사용)
    opts[i].dataset.votes=parseInt(opts[i].dataset.votes,10)+1;
    recompute();
  },3000);

  function closePoll(){
    document.body.classList.add('closed');
    stopTimer();clearInterval(poll);
    document.getElementById('statusLive').style.display='none';
    document.getElementById('statusClosed').style.display='flex';
    document.getElementById('votebar').style.display='none';
    document.querySelector('.demo').style.display='none';
    var r=recompute();
    document.body.classList.toggle('tie',r.maxCount>1);
    document.getElementById('statusClosed').classList.toggle('tie',r.maxCount>1);
    window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
  }
  function openPoll(){
    document.body.classList.remove('closed','tie');
    document.getElementById('statusClosed').style.display='none';
    document.getElementById('statusLive').style.display='flex';
    document.getElementById('votebar').style.display='block';
    startTimer();
  }

  document.getElementById('toggleClose').addEventListener('click',function(){
    if(document.body.classList.contains('closed'))openPoll();else closePoll();
  });
  // 동점 액션 (재투표: 재개설 → home / 추첨)
  document.getElementById('revoteBtn').addEventListener('click',function(){window.location.href='create.html';});
  document.getElementById('rouletteBtn').addEventListener('click',function(){
    var w=opts.filter(function(o){return o.classList.contains('tied')});
    var pick=w[secs%w.length]; // 결정적 선택
    document.body.classList.remove('tie');document.getElementById('statusClosed').classList.remove('tie');
    opts.forEach(function(o){o.classList.remove('tied','winner')});
    pick.classList.add('winner');
    document.querySelector('.result-banner.win .big').textContent=pick.querySelector('.emoji').textContent+' '+pick.querySelector('.name').childNodes[0].textContent.trim();
    document.querySelector('.result-banner.win .lbl').textContent='🎲 추첨 결과';
    document.querySelector('.result-banner.win .sub').textContent='동점 후보 중 무작위로 선정됐어요.';
  });

  recompute();startTimer();
})();
</script>
</body>
</html>
