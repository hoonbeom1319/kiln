<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>점심투표 · 투표 만들기</title>
<style>
:root{
  --white:#fff;--black:#000;
  --gray-50:#f7f6f4;--gray-100:#eeece8;--gray-200:#e0ddd6;--gray-300:#cbc7bd;--gray-400:#a8a297;--gray-500:#837d71;--gray-600:#635e54;--gray-700:#47433b;--gray-800:#2c2a25;--gray-900:#1a1815;
  --orange-50:#fff4ec;--orange-100:#ffe3d1;--orange-200:#ffc4a0;--orange-300:#ff9f66;--orange-400:#fb7f36;--orange-500:#e8590c;--orange-600:#c2410c;--orange-700:#9a3412;
  --green-100:#d7f2df;--green-500:#2f9e44;--green-600:#218839;--green-700:#1a6e2e;
  --red-100:#ffe0e0;--red-500:#e03131;--red-600:#c92a2a;
  --amber-100:#fff2cc;--amber-500:#f08c00;--amber-700:#b45309;
  --blue-500:#1c7ed6;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;
  --radius-1:8px;--radius-2:12px;--radius-3:20px;--radius-full:999px;
  --font-1:13px;--font-2:15px;--font-3:18px;--font-4:22px;--font-5:28px;
  --touch-min:48px;
  --color-bg:var(--gray-50);--color-surface:var(--white);--color-surface-alt:var(--gray-100);
  --color-border:var(--gray-200);--color-border-strong:var(--gray-300);
  --color-text:var(--gray-900);--color-text-muted:var(--gray-600);--color-text-subtle:var(--gray-500);
  --color-primary:var(--orange-500);--color-primary-hover:var(--orange-600);--color-primary-soft:var(--orange-100);--color-on-primary:var(--white);
  --color-success:var(--green-600);--color-success-soft:var(--green-100);
  --color-danger:var(--red-600);--color-danger-soft:var(--red-100);
  --color-warning:var(--amber-700);--color-warning-soft:var(--amber-100);
  --color-focus-ring:var(--orange-400);--color-overlay:rgba(26,24,21,.55);
  --shadow-1:0 1px 2px rgba(26,24,21,.06),0 1px 3px rgba(26,24,21,.08);
  --shadow-2:0 4px 12px rgba(26,24,21,.10),0 2px 4px rgba(26,24,21,.06);
  --shadow-3:0 12px 32px rgba(26,24,21,.16),0 4px 8px rgba(26,24,21,.08);
}
:root[data-theme="dark"]{
  --color-bg:var(--gray-900);--color-surface:var(--gray-800);--color-surface-alt:#232019;
  --color-border:#3a362f;--color-border-strong:#4a453c;
  --color-text:var(--gray-50);--color-text-muted:var(--gray-300);--color-text-subtle:var(--gray-400);
  --color-primary:var(--orange-400);--color-primary-hover:var(--orange-300);--color-primary-soft:#3a2415;--color-on-primary:#1a1815;
  --color-success-soft:#183a22;--color-danger-soft:#3a1a1a;--color-warning-soft:#3a2f15;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 4px 12px rgba(0,0,0,.5);--shadow-3:0 16px 40px rgba(0,0,0,.6);
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --color-bg:var(--gray-900);--color-surface:var(--gray-800);--color-surface-alt:#232019;
  --color-border:#3a362f;--color-border-strong:#4a453c;
  --color-text:var(--gray-50);--color-text-muted:var(--gray-300);--color-text-subtle:var(--gray-400);
  --color-primary:var(--orange-400);--color-primary-hover:var(--orange-300);--color-primary-soft:#3a2415;--color-on-primary:#1a1815;
  --color-success-soft:#183a22;--color-danger-soft:#3a1a1a;--color-warning-soft:#3a2f15;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 4px 12px rgba(0,0,0,.5);--shadow-3:0 16px 40px rgba(0,0,0,.6);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--color-bg);color:var(--color-text);-webkit-font-smoothing:antialiased;line-height:1.5;
  min-height:100dvh;
}
.app{width:100%;max-width:560px;margin:0 auto;padding-bottom:calc(var(--touch-min)*2 + env(safe-area-inset-bottom))}
.appbar{
  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--color-bg) 82%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--color-border);
  padding:calc(var(--sp-3) + env(safe-area-inset-top)) var(--sp-3) var(--sp-3);
  display:flex;align-items:center;gap:var(--sp-2);
}
.appbar .title{font-size:var(--font-3);font-weight:800;flex:1;text-align:center}
.iconbtn{
  width:var(--touch-min);height:var(--touch-min);border-radius:var(--radius-full);
  border:1px solid transparent;background:transparent;color:var(--color-text);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.iconbtn:hover{background:var(--color-surface-alt)}
.iconbtn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.content{padding:var(--sp-5) var(--sp-4) 0}
.step{font-size:var(--font-1);color:var(--color-text-subtle);font-weight:700;letter-spacing:.02em;text-transform:uppercase;margin-bottom:var(--sp-2)}
.group{margin-bottom:var(--sp-6)}
.group>.head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--sp-2)}
label{font-size:var(--font-2);font-weight:700}
.hint{font-size:var(--font-1);color:var(--color-text-subtle)}
input[type=text],input[type=datetime-local]{
  width:100%;height:var(--touch-min);border:1px solid var(--color-border-strong);
  border-radius:var(--radius-2);background:var(--color-surface);color:var(--color-text);
  font-size:var(--font-2);padding:0 var(--sp-4);transition:border-color .15s,box-shadow .15s;
}
input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-focus-ring)}
input.err{border-color:var(--color-danger);box-shadow:0 0 0 3px var(--color-danger-soft)}
.count-badge{font-size:var(--font-1);color:var(--color-text-subtle);text-align:right;margin-top:var(--sp-1)}
/* candidate list */
.cand{
  display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-2);
  animation:slideIn .2s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.cand .handle{width:26px;text-align:center;color:var(--color-text-subtle);font-size:18px;flex:none;cursor:grab}
.cand input{flex:1}
.cand .rm{
  width:var(--touch-min);height:var(--touch-min);flex:none;border:1px solid var(--color-border);
  border-radius:var(--radius-2);background:var(--color-surface);color:var(--color-danger);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .08s}
.cand .rm:hover{background:var(--color-danger-soft)}
.cand .rm:active{transform:scale(.92)}
.cand .rm:disabled{opacity:.35;cursor:not-allowed}
.cand .rm:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.add-cand{
  width:100%;height:var(--touch-min);border:1.5px dashed var(--color-border-strong);
  border-radius:var(--radius-2);background:transparent;color:var(--color-primary);
  font-size:var(--font-2);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:var(--sp-2);
  transition:background .15s,border-color .15s;margin-top:var(--sp-2)}
.add-cand:hover{background:var(--color-primary-soft);border-color:var(--color-primary)}
.add-cand:disabled{opacity:.4;cursor:not-allowed}
.add-cand:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
/* deadline quick chips */
.chips{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-bottom:var(--sp-3)}
.chip-btn{
  height:40px;padding:0 var(--sp-4);border-radius:var(--radius-full);
  border:1px solid var(--color-border-strong);background:var(--color-surface);color:var(--color-text);
  font-size:var(--font-1);font-weight:600;cursor:pointer;transition:all .15s}
.chip-btn:hover{border-color:var(--color-primary)}
.chip-btn.active{background:var(--color-primary);color:var(--color-on-primary);border-color:var(--color-primary)}
.chip-btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
/* validation msg */
.vmsg{display:none;align-items:center;gap:6px;color:var(--color-danger);font-size:var(--font-1);margin-top:var(--sp-2)}
.vmsg.show{display:flex}
/* sticky footer bar */
.actionbar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:color-mix(in srgb,var(--color-bg) 90%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--color-border);
  padding:var(--sp-3) var(--sp-4) calc(var(--sp-3) + env(safe-area-inset-bottom));
  display:flex;gap:var(--sp-3);justify-content:center;
}
.actionbar .inner{width:100%;max-width:560px;display:flex;gap:var(--sp-3)}
.btn{height:var(--touch-min);border-radius:var(--radius-2);font-size:var(--font-2);font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:var(--sp-2);border:1px solid transparent;transition:background .15s,transform .08s,box-shadow .15s;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.btn-ghost{background:var(--color-surface);border-color:var(--color-border-strong);color:var(--color-text);flex:none;padding:0 var(--sp-5)}
.btn-ghost:hover{background:var(--color-surface-alt)}
.btn-primary{background:var(--color-primary);color:var(--color-on-primary);flex:1;box-shadow:var(--shadow-1)}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-primary[disabled]{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.summary-line{font-size:var(--font-1);color:var(--color-text-muted);text-align:center;margin-top:var(--sp-2)}
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <a class="iconbtn" href="home.html" aria-label="뒤로">←</a>
    <div class="title">투표 만들기</div>
    <button class="iconbtn" id="themeBtn" aria-label="다크모드 전환">🌙</button>
  </header>

  <main class="content">
    <form id="createForm" novalidate>
      <!-- 제목 -->
      <div class="group">
        <div class="step">STEP 1 · 무엇을 정할까요</div>
        <div class="head"><label for="title">투표 제목</label><span class="hint">필수</span></div>
        <input type="text" id="title" maxlength="40" placeholder="예) 우리 팀 오늘 점심" value="우리 팀 오늘 점심">
        <div class="count-badge"><span id="titleCount">10</span>/40</div>
        <div class="vmsg" id="titleMsg">⚠️ 제목을 입력해 주세요.</div>
      </div>

      <!-- 후보 -->
      <div class="group">
        <div class="step">STEP 2 · 후보를 올려요</div>
        <div class="head"><label>후보 목록</label><span class="hint" id="candHint">최소 2개 · 최대 8개</span></div>
        <div id="candList">
          <div class="cand">
            <span class="handle" aria-hidden="true">⠿</span>
            <input type="text" class="cand-input" maxlength="30" placeholder="후보 1" value="김치찌개집">
            <button type="button" class="rm" aria-label="후보 삭제">✕</button>
          </div>
          <div class="cand">
            <span class="handle" aria-hidden="true">⠿</span>
            <input type="text" class="cand-input" maxlength="30" placeholder="후보 2" value="파스타집">
            <button type="button" class="rm" aria-label="후보 삭제">✕</button>
          </div>
          <div class="cand">
            <span class="handle" aria-hidden="true">⠿</span>
            <input type="text" class="cand-input" maxlength="30" placeholder="후보 3" value="샐러드볼">
            <button type="button" class="rm" aria-label="후보 삭제">✕</button>
          </div>
        </div>
        <button type="button" class="add-cand" id="addBtn">＋ 후보 추가</button>
        <div class="vmsg" id="candMsg">⚠️ 후보를 2개 이상 입력해 주세요.</div>
      </div>

      <!-- 마감 -->
      <div class="group">
        <div class="step">STEP 3 · 언제 마감할까요</div>
        <div class="head"><label for="deadline">마감 시간</label><span class="hint">미래 시각</span></div>
        <div class="chips" role="group" aria-label="마감 시간 빠른 선택">
          <button type="button" class="chip-btn active" data-min="30">＋30분</button>
          <button type="button" class="chip-btn" data-min="60">＋1시간</button>
          <button type="button" class="chip-btn" data-min="120">＋2시간</button>
          <button type="button" class="chip-btn" data-min="0">직접 선택</button>
        </div>
        <input type="datetime-local" id="deadline">
        <div class="vmsg" id="dlMsg">⚠️ 마감은 현재보다 미래여야 합니다.</div>
      </div>
    </form>
  </main>
</div>

<div class="actionbar">
  <div class="inner" style="flex-direction:column">
    <div style="display:flex;gap:var(--sp-3)">
      <a class="btn btn-ghost" href="home.html">취소</a>
      <button class="btn btn-primary" id="submitBtn" type="submit" form="createForm">투표 만들기 →</button>
    </div>
    <div class="summary-line" id="summaryLine">후보 3개 · 30분 뒤 마감</div>
  </div>
</div>

<script>
(function(){
  var root=document.documentElement, tbtn=document.getElementById('themeBtn');
  function sysDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches}
  function cur(){var t=root.getAttribute('data-theme');return t?t:(sysDark()?'dark':'light')}
  function paint(){tbtn.textContent=cur()==='dark'?'☀️':'🌙'}
  paint();
  tbtn.addEventListener('click',function(){root.setAttribute('data-theme',cur()==='dark'?'light':'dark');paint()});

  var MAX=8, MIN=2;
  var title=document.getElementById('title'), titleCount=document.getElementById('titleCount'),
      candList=document.getElementById('candList'), addBtn=document.getElementById('addBtn'),
      candHint=document.getElementById('candHint'), deadline=document.getElementById('deadline'),
      form=document.getElementById('createForm'), submitBtn=document.getElementById('submitBtn'),
      summaryLine=document.getElementById('summaryLine');
  var chosenMin=30;

  // 마감 기본값: 데모라 고정 오프셋 표시(실제 now 사용 불가 환경 대비 placeholder)
  function pad(n){return (n<10?'0':'')+n}
  function setDeadlineFromNow(min){
    var d=new Date(Date.now()+min*60000);
    deadline.value=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
  }
  try{setDeadlineFromNow(30);}catch(e){}

  title.addEventListener('input',function(){titleCount.textContent=title.value.length;title.classList.remove('err');document.getElementById('titleMsg').classList.remove('show');updateSummary()});

  function candInputs(){return candList.querySelectorAll('.cand-input')}
  function refreshRemove(){
    var rows=candList.querySelectorAll('.cand'), disable=rows.length<=MIN;
    rows.forEach(function(r){r.querySelector('.rm').disabled=disable});
    addBtn.disabled=rows.length>=MAX;
    candHint.textContent=rows.length+'/'+MAX+'개';
    updateSummary();
  }
  function bindRow(row){
    row.querySelector('.rm').addEventListener('click',function(){
      if(candList.querySelectorAll('.cand').length<=MIN)return;
      row.style.opacity=0;row.style.transform='translateX(-12px)';row.style.transition='all .18s';
      setTimeout(function(){row.remove();refreshRemove();},160);
    });
    row.querySelector('.cand-input').addEventListener('input',function(){document.getElementById('candMsg').classList.remove('show');updateSummary()});
  }
  candList.querySelectorAll('.cand').forEach(bindRow);

  addBtn.addEventListener('click',function(){
    var rows=candList.querySelectorAll('.cand');
    if(rows.length>=MAX)return;
    var row=document.createElement('div');
    row.className='cand';
    row.innerHTML='<span class="handle" aria-hidden="true">⠿</span><input type="text" class="cand-input" maxlength="30" placeholder="후보 '+(rows.length+1)+'"><button type="button" class="rm" aria-label="후보 삭제">✕</button>';
    candList.appendChild(row);bindRow(row);refreshRemove();
    row.querySelector('.cand-input').focus();
  });

  // 마감 칩
  document.querySelectorAll('.chip-btn').forEach(function(c){
    c.addEventListener('click',function(){
      document.querySelectorAll('.chip-btn').forEach(function(x){x.classList.remove('active')});
      c.classList.add('active');
      var m=parseInt(c.dataset.min,10);
      if(m>0){chosenMin=m;setDeadlineFromNow(m);document.getElementById('dlMsg').classList.remove('show');}
      else{deadline.focus();}
      updateSummary();
    });
  });
  deadline.addEventListener('input',function(){document.getElementById('dlMsg').classList.remove('show');updateSummary()});

  function filledCands(){return Array.prototype.filter.call(candInputs(),function(i){return i.value.trim().length>0}).length}
  function updateSummary(){
    var n=filledCands();
    var activeChip=document.querySelector('.chip-btn.active');
    var when=activeChip&&parseInt(activeChip.dataset.min,10)>0?(parseInt(activeChip.dataset.min,10)+'분 뒤 마감'):'지정 시각 마감';
    summaryLine.textContent='후보 '+n+'개 · '+when;
  }
  refreshRemove();

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var ok=true;
    if(!title.value.trim()){title.classList.add('err');document.getElementById('titleMsg').classList.add('show');ok=false;}
    if(filledCands()<MIN){document.getElementById('candMsg').classList.add('show');ok=false;}
    var dlv=deadline.value;
    if(!dlv || (new Date(dlv).getTime()<=Date.now())){document.getElementById('dlMsg').classList.add('show');ok=false;}
    if(!ok){var first=document.querySelector('.err, .vmsg.show');if(first)first.scrollIntoView({behavior:'smooth',block:'center'});return;}
    submitBtn.disabled=true;submitBtn.textContent='만드는 중…';
    setTimeout(function(){window.location.href='vote.html';},700);
  });
})();
</script>
</body>
</html>
