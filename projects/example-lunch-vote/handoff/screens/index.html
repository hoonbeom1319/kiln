<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>점심투표 · 로그인</title>
<style>
:root{
  --white:#fff;--black:#000;
  --gray-50:#f7f6f4;--gray-100:#eeece8;--gray-200:#e0ddd6;--gray-300:#cbc7bd;--gray-400:#a8a297;--gray-500:#837d71;--gray-600:#635e54;--gray-700:#47433b;--gray-800:#2c2a25;--gray-900:#1a1815;
  --orange-50:#fff4ec;--orange-100:#ffe3d1;--orange-200:#ffc4a0;--orange-300:#ff9f66;--orange-400:#fb7f36;--orange-500:#e8590c;--orange-600:#c2410c;--orange-700:#9a3412;
  --green-100:#d7f2df;--green-500:#2f9e44;--green-600:#218839;--green-700:#1a6e2e;
  --red-100:#ffe0e0;--red-500:#e03131;--red-600:#c92a2a;
  --amber-100:#fff2cc;--amber-500:#f08c00;--amber-700:#b45309;
  --blue-500:#1c7ed6;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;
  --radius-1:8px;--radius-2:12px;--radius-3:20px;--radius-full:999px;
  --font-1:13px;--font-2:15px;--font-3:18px;--font-4:22px;--font-5:28px;
  --touch-min:48px;
  --color-bg:var(--gray-50);--color-surface:var(--white);--color-surface-alt:var(--gray-100);
  --color-border:var(--gray-200);--color-border-strong:var(--gray-300);
  --color-text:var(--gray-900);--color-text-muted:var(--gray-600);--color-text-subtle:var(--gray-500);
  --color-primary:var(--orange-500);--color-primary-hover:var(--orange-600);--color-primary-soft:var(--orange-100);--color-on-primary:var(--white);
  --color-success:var(--green-600);--color-success-soft:var(--green-100);
  --color-danger:var(--red-600);--color-danger-soft:var(--red-100);
  --color-focus-ring:var(--orange-400);--color-overlay:rgba(26,24,21,.55);
  --shadow-1:0 1px 2px rgba(26,24,21,.06),0 1px 3px rgba(26,24,21,.08);
  --shadow-2:0 4px 12px rgba(26,24,21,.10),0 2px 4px rgba(26,24,21,.06);
  --shadow-3:0 12px 32px rgba(26,24,21,.16),0 4px 8px rgba(26,24,21,.08);
}
:root[data-theme="dark"]{
  --color-bg:var(--gray-900);--color-surface:var(--gray-800);--color-surface-alt:#232019;
  --color-border:#3a362f;--color-border-strong:#4a453c;
  --color-text:var(--gray-50);--color-text-muted:var(--gray-300);--color-text-subtle:var(--gray-400);
  --color-primary:var(--orange-400);--color-primary-hover:var(--orange-300);--color-primary-soft:#3a2415;--color-on-primary:#1a1815;
  --color-success-soft:#183a22;--color-danger-soft:#3a1a1a;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 4px 12px rgba(0,0,0,.5);--shadow-3:0 16px 40px rgba(0,0,0,.6);
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --color-bg:var(--gray-900);--color-surface:var(--gray-800);--color-surface-alt:#232019;
  --color-border:#3a362f;--color-border-strong:#4a453c;
  --color-text:var(--gray-50);--color-text-muted:var(--gray-300);--color-text-subtle:var(--gray-400);
  --color-primary:var(--orange-400);--color-primary-hover:var(--orange-300);--color-primary-soft:#3a2415;--color-on-primary:#1a1815;
  --color-success-soft:#183a22;--color-danger-soft:#3a1a1a;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);--shadow-2:0 4px 12px rgba(0,0,0,.5);--shadow-3:0 16px 40px rgba(0,0,0,.6);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--color-bg);color:var(--color-text);
  -webkit-font-smoothing:antialiased;line-height:1.5;
  display:flex;flex-direction:column;min-height:100dvh;
}
.theme-toggle{
  position:fixed;top:max(var(--sp-4),env(safe-area-inset-top));right:var(--sp-4);z-index:10;
  width:var(--touch-min);height:var(--touch-min);border-radius:var(--radius-full);
  border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);
  font-size:20px;cursor:pointer;box-shadow:var(--shadow-1);
  display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s;
}
.theme-toggle:hover{background:var(--color-surface-alt)}
.theme-toggle:active{transform:scale(.92)}
.theme-toggle:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.wrap{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  width:100%;max-width:440px;margin:0 auto;padding:var(--sp-6) var(--sp-5);
  padding-bottom:max(var(--sp-6),env(safe-area-inset-bottom));
}
.brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:var(--sp-7)}
.logo{
  width:76px;height:76px;border-radius:var(--radius-3);
  background:linear-gradient(145deg,var(--orange-400),var(--orange-600));
  display:flex;align-items:center;justify-content:center;font-size:40px;
  box-shadow:var(--shadow-2),inset 0 1px 0 rgba(255,255,255,.25);margin-bottom:var(--sp-4);
}
.brand h1{font-size:var(--font-5);font-weight:800;letter-spacing:-.02em}
.brand p{color:var(--color-text-muted);font-size:var(--font-2);margin-top:var(--sp-2)}
.card{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-3);padding:var(--sp-5);box-shadow:var(--shadow-2);
}
.field{margin-bottom:var(--sp-4)}
.field:last-of-type{margin-bottom:0}
label{display:block;font-size:var(--font-1);font-weight:600;color:var(--color-text-muted);margin-bottom:var(--sp-2)}
.input-shell{position:relative;display:flex;align-items:center}
.input-shell .ico{position:absolute;left:var(--sp-3);font-size:18px;opacity:.55;pointer-events:none}
input[type=email],input[type=password]{
  width:100%;height:var(--touch-min);border:1px solid var(--color-border-strong);
  border-radius:var(--radius-2);background:var(--color-bg);color:var(--color-text);
  font-size:var(--font-2);padding:0 var(--sp-4) 0 var(--sp-7);
  transition:border-color .15s,box-shadow .15s;
}
input::placeholder{color:var(--color-text-subtle)}
input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-focus-ring)}
input.err{border-color:var(--color-danger)}
.alert{
  display:none;align-items:flex-start;gap:var(--sp-2);
  background:var(--color-danger-soft);color:var(--color-danger);
  border-radius:var(--radius-2);padding:var(--sp-3);font-size:var(--font-1);
  margin-top:var(--sp-4);line-height:1.4;
}
.alert.show{display:flex}
.btn{
  width:100%;height:var(--touch-min);border:none;border-radius:var(--radius-2);
  font-size:var(--font-2);font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:var(--sp-2);
  transition:background .15s,transform .08s,box-shadow .15s;
}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.btn-primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-1);margin-top:var(--sp-5)}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-primary[disabled]{opacity:.55;cursor:not-allowed;transform:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-primary.loading .spinner{display:block}
.btn-primary.loading .label{opacity:.85}
@keyframes spin{to{transform:rotate(360deg)}}
.sso{
  display:flex;align-items:center;gap:var(--sp-3);width:100%;height:var(--touch-min);
  border:1px solid var(--color-border-strong);border-radius:var(--radius-2);
  background:var(--color-surface);color:var(--color-text);font-size:var(--font-2);font-weight:600;
  justify-content:center;cursor:pointer;margin-top:var(--sp-3);transition:background .15s;
}
.sso:hover{background:var(--color-surface-alt)}
.sso:active{transform:translateY(1px)}
.sso:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-focus-ring)}
.divider{display:flex;align-items:center;gap:var(--sp-3);margin:var(--sp-5) 0 0;color:var(--color-text-subtle);font-size:var(--font-1)}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--color-border)}
.foot{text-align:center;color:var(--color-text-subtle);font-size:var(--font-1);margin-top:var(--sp-6);line-height:1.6}
.foot .note{display:inline-flex;align-items:center;gap:6px}
</style>
</head>
<body>
<button class="theme-toggle" id="themeBtn" aria-label="다크모드 전환" title="테마 전환">🌙</button>

<main class="wrap">
  <div class="brand">
    <div class="logo" aria-hidden="true">🍚</div>
    <h1>오늘 점심 뭐 먹지</h1>
    <p>후보 올리고, 투표하고, 자동 마감</p>
  </div>

  <section class="card">
    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">사내 이메일</label>
        <div class="input-shell">
          <span class="ico" aria-hidden="true">✉️</span>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="username" value="jiwon.kim@company.com">
        </div>
      </div>
      <div class="field">
        <label for="pw">비밀번호</label>
        <div class="input-shell">
          <span class="ico" aria-hidden="true">🔒</span>
          <input type="password" id="pw" name="pw" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <div class="alert" id="alert" role="alert">
        <span aria-hidden="true">⚠️</span>
        <span id="alertMsg">이메일 또는 비밀번호가 올바르지 않습니다.</span>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span class="spinner" aria-hidden="true"></span>
        <span class="label">로그인</span>
      </button>
    </form>

    <div class="divider">또는</div>
    <button type="button" class="sso" id="ssoBtn">
      <span aria-hidden="true">🏢</span> 사내 SSO로 계속하기
    </button>
  </section>

  <p class="foot">
    <span class="note">🔐 사내 구성원 전용 — 외부 공개 서비스가 아닙니다</span><br>
    데모 로그인: 아무 비밀번호나 입력하면 홈으로 이동합니다.
  </p>
</main>

<script>
(function(){
  var root=document.documentElement, tbtn=document.getElementById('themeBtn');
  function sysDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches}
  function cur(){var t=root.getAttribute('data-theme');return t?t:(sysDark()?'dark':'light')}
  function paint(){tbtn.textContent=cur()==='dark'?'☀️':'🌙'}
  paint();
  tbtn.addEventListener('click',function(){root.setAttribute('data-theme',cur()==='dark'?'light':'dark');paint()});

  var form=document.getElementById('loginForm'),
      email=document.getElementById('email'), pw=document.getElementById('pw'),
      alert=document.getElementById('alert'), alertMsg=document.getElementById('alertMsg'),
      btn=document.getElementById('submitBtn');

  function fail(msg){alertMsg.textContent=msg;alert.classList.add('show');email.classList.add('err');pw.classList.add('err')}
  function clearErr(){alert.classList.remove('show');email.classList.remove('err');pw.classList.remove('err')}
  email.addEventListener('input',clearErr); pw.addEventListener('input',clearErr);

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var ev=email.value.trim();
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(ev)){fail('올바른 사내 이메일 형식이 아닙니다.');email.focus();return}
    if(pw.value.length<1){fail('비밀번호를 입력해 주세요.');pw.focus();return}
    clearErr();
    btn.classList.add('loading');btn.disabled=true;
    setTimeout(function(){window.location.href='home.html'},900);
  });
  document.getElementById('ssoBtn').addEventListener('click',function(){
    btn.classList.add('loading');btn.disabled=true;
    setTimeout(function(){window.location.href='home.html'},700);
  });
})();
</script>
</body>
</html>
