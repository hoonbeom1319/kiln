<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>example-lunch-vote — 화면 갤러리</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 2rem; background: #0f1115; color: #e8eaed; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
  p.idea { color: #9aa0a6; margin: 0 0 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
  .card { margin: 0; border: 1px solid #2a2d34; border-radius: 12px; overflow: hidden; background: #16181d; }
  figcaption { padding: .6rem .9rem; font-weight: 600; border-bottom: 1px solid #2a2d34; }
  iframe { width: 100%; height: 520px; border: 0; background: #fff; display: block; }
</style>
</head>
<body>
  <h1>example-lunch-vote — 화면 갤러리</h1>
  <p class="idea">사내 점심 투표앱 만들어줘</p>
  <div class="grid">
    <figure class="card">
      <figcaption>create.html</figcaption>
      <iframe src="screens/create.html" title="create.html" loading="lazy"></iframe>
    </figure>

    <figure class="card">
      <figcaption>home.html</figcaption>
      <iframe src="screens/home.html" title="home.html" loading="lazy"></iframe>
    </figure>

    <figure class="card">
      <figcaption>index.html</figcaption>
      <iframe src="screens/index.html" title="index.html" loading="lazy"></iframe>
    </figure>

    <figure class="card">
      <figcaption>vote.html</figcaption>
      <iframe src="screens/vote.html" title="vote.html" loading="lazy"></iframe>
    </figure>
  </div>
</body>
</html>
