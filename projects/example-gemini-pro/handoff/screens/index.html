<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixture 런처</title>
  <style>
    :root {
      --gray-900: #1a1a1a;
      --gray-50:  #fafafa;
      --gray-300: #cccccc;
      --coral-500: #e8533f;
      --white: #ffffff;

      --color-text: var(--gray-900);
      --color-bg: var(--gray-50);
      --color-surface: var(--white);
      --color-primary: var(--coral-500);
      --color-on-primary: var(--white);
      --color-text-muted: var(--gray-300);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background-color: var(--color-bg);
      color: var(--color-text);
      font-size: 16px;
      line-height: 1.6;
    }
    h1, h2, h3, p { margin: 0; }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
      text-decoration: none;
    }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(232, 83, 63, 0.3);
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background-color: var(--color-primary);
      color: var(--color-on-primary);
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .btn-primary:hover { background-color: #d9432e; text-decoration: none; }

    .launcher-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .launcher-card {
      background-color: var(--color-surface);
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }
    .launcher-card h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .launcher-card p {
      margin-top: 16px;
      margin-bottom: 32px;
      color: #4b5563; /* gray-600 */
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  <div class="launcher-wrapper">
    <div class="launcher-card">
      <h1>Fixture 프로젝트</h1>
      <p>하네스 회귀 및 린트 검증용 더미 프로젝트의 최종 기능 화면으로 이동합니다.</p>
      <a href="main.html" class="btn btn-primary">기능 화면으로 이동</a>
    </div>
  </div>
</body>
</html>
